# /etc/nginx/conf.d/usuarios.conf  (o incluido desde nginx.conf)
# Frontend estático + reverse-proxy de /api al backend Node (mismo origen).
server {
    listen 10025 ssl;
    listen [::]:10025 ssl;
    server_name _;

    # Cert Let's Encrypt existente (válido para d43b0e3c7530.sn.mynetname.net)
    ssl_certificate     /etc/letsencrypt/live/d43b0e3c7530.sn.mynetname.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/d43b0e3c7530.sn.mynetname.net/privkey.pem;

    root /opt/nginx/usuarios;
    index index.html;

    # Archivos estáticos del SPA con fallback a index.html (rutas de React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API -> backend Node local (mismo origen, sin exponer el puerto 10024)
    location /api/ {
        proxy_pass http://127.0.0.1:10024;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Client-IP       $remote_addr;   # el backend lo usa para auditoría
        proxy_read_timeout 120s;
        client_max_body_size 25m;                          # subidas/imports
    }
}
